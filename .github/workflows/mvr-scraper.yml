name: MVR Accidents Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 София — сутрешната справка за предния ден
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'Колко дни назад да търси (backfill)'
        required: false
        default: '3'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run scraper
        env:
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '3' }}
        run: python scripts/scrape_mvr.py
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mvr_accidents.json
          git diff --cached --quiet || (git commit -m "auto: MVR данни $(date -u +%Y-%m-%d)" && git push)
