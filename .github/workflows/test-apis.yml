name: Test Road Safety APIs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Test APIs
        run: python scripts/test_apis.py
      - name: Save results
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/api_test_results.json
          git diff --staged --quiet || git commit -m "test: API results $(date -u +%Y-%m-%dT%H:%M)"
          git push
