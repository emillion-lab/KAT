name: MVR Probe

on: workflow_dispatch

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          R="mvr-probe.txt"
          ID="0b7065b1f1d34d7d8ad530c51434a9f0"
          echo "== MVR ArcGIS probe $(date -u) ==" > $R

          echo "--- dashboard item data ---" >> $R
          curl -s "https://www.mvr.bg/map/sharing/rest/content/items/$ID/data?f=json" -o dash.json -w "HTTP %{http_code}, %{size_download} bytes\n" >> $R
          echo "--- feature service URLs found ---" >> $R
          grep -oE 'https?://[^"]*(FeatureServer|MapServer)[^"]*' dash.json | sort -u | head -20 >> $R
          grep -oE '"itemId"\s*:\s*"[a-f0-9]{32}"' dash.json | sort -u | head -10 >> $R

          echo "--- portal search за ПТП услуги ---" >> $R
          curl -s "https://www.mvr.bg/map/sharing/rest/search?q=%D0%9F%D0%A2%D0%9F&f=json&num=20" | python3 -c "
          import json,sys
          try:
              d=json.load(sys.stdin)
              for r in d.get('results',[]):
                  print(r.get('type'),'|',r.get('title'),'|',r.get('url') or r.get('id'))
          except Exception as e: print('parse err',e)" >> $R

          echo "--- data.egov.bg CKAN ПТП datasets ---" >> $R
          curl -s "https://data.egov.bg/api/3/action/package_search?q=%D0%BF%D1%8A%D1%82%D0%BD%D0%BE%D1%82%D1%80%D0%B0%D0%BD%D1%81%D0%BF%D0%BE%D1%80%D1%82%D0%BD%D0%B8&rows=10" | python3 -c "
          import json,sys
          try:
              d=json.load(sys.stdin)
              for p in d['result']['results']:
                  print('DATASET:',p['title'],'| updated:',p.get('metadata_modified'))
                  for res in p.get('resources',[])[:4]:
                      print('  res:',res.get('format'),res.get('url','')[:120])
          except Exception as e: print('parse err',e)" >> $R

          git config user.name ci; git config user.email ci@fish.taxi
          git add mvr-probe.txt && git commit -m "mvr probe [skip ci]" || true
          git push
